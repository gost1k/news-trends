# Node.js API Deployment
# kubectl apply -f infrastructure/k8s/deployments/api.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newsmap-api
  namespace: newsmap
  labels:
    app: newsmap-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newsmap-api
  template:
    metadata:
      labels:
        app: newsmap-api
    spec:
      containers:
        - name: api
          image: newsmap/api:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsmap-secrets
                  key: database-url
            - name: REDIS_HOST
              value: "newsmap-redis"
            - name: ELASTICSEARCH_URL
              value: "http://newsmap-elasticsearch:9200"
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: newsmap-config
                  key: ollama-url
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
