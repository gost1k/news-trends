# =============================================================================
# Nginx Gateway — центральный reverse proxy для всей сети
# VM: vm-gateway | Замена HAProxy на OpenWRT
# =============================================================================
#
# Маршрутизация по субдоменам:
#   newsmap.example.com   → vm-dev (React + API)
#   kibana.example.com    → vm-infra:5601
#   grafana.example.com   → vm-infra:3000
#   es.example.com        → vm-infra:9200
#   ollama.example.com    → ollama-host:11434
#   *.example.com         → добавляй новые проекты сюда
#
# SSL: wildcard сертификат Let's Encrypt (DNS-01 challenge)
# HTTP/2: включен для всех HTTPS-серверов
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Логирование ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # --- Производительность ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # --- SSL общие настройки ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Wildcard сертификат ---
    # Получение: certbot certonly --dns-cloudflare -d "*.example.com" -d "example.com"
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # --- Upstream серверы (замени IP на свои) ---
    # Эти адреса — внутренние IP виртуальных машин в Proxmox

    # vm-dev: Node.js API
    upstream newsmap_api {
        server 192.168.1.100:3001;
    }

    # vm-dev: React dev server (в production — статика из Nginx)
    upstream newsmap_web {
        server 192.168.1.100:5173;
    }

    # vm-infra: сервисы
    upstream kibana {
        server 192.168.1.101:5601;
    }

    upstream grafana {
        server 192.168.1.101:3000;
    }

    upstream elasticsearch {
        server 192.168.1.101:9200;
    }

    upstream prometheus {
        server 192.168.1.101:9090;
    }

    # Ollama: отдельная машина
    upstream ollama {
        server 192.168.1.200:11434;
    }

    # --- Подключение конфигов сайтов ---
    include /etc/nginx/conf.d/*.conf;
}
