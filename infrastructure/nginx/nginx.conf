# Reverse proxy: маршрутизация запросов между фронтендом, API и WebSocket
# Этот конфиг — для production. В dev используется Vite proxy (vite.config.ts)

upstream api_backend {
    server localhost:3001;
}

server {
    listen 80;
    server_name newsmap.local;

    # React SPA — статика
    location / {
        root /var/www/newsmap;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Node.js API
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.io)
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Kibana (опционально, можно убрать в production)
    location /kibana/ {
        proxy_pass http://localhost:5601/;
        proxy_set_header Host $host;
    }

    # Grafana (опционально)
    location /grafana/ {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
    }
}
